<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>利用約款 | MY-home</title>

<style>
body{
font-family:sans-serif;
margin:40px;
line-height:1.7;
background:#f5f5f5;
}

h1{
border-bottom:2px solid #333;
padding-bottom:10px;
}

.section{
margin-top:25px;
}

.back{
margin-top:40px;
display:inline-block;
padding:8px 14px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:6px;
}
  .tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  background: #333;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.tabs button:hover {
  background: #555;
}

.tab-content {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<section id="terms">

  <h1>MY-home</h1>

  <!-- タブ -->
  <div class="tabs">
    <button onclick="showTab('terms')">利用規約</button>
    <button onclick="showTab('privacy')">プライバシー</button>
    <button onclick="showTab('history')">変更履歴</button>
  </div>

  <!-- 利用規約 -->
  <div class="tab-content" id="terms-content">
    <h2>利用規約</h2>
    <p>本サービスは自己責任で利用してください。</p>
  </div>

  <!-- プライバシー -->
  <div class="tab-content" id="privacy-content" style="display:none;">
    <h2>プライバシーポリシー</h2>
    <p>個人情報は収集しません。</p>
  </div>

  <!-- 変更履歴 -->
  <div class="tab-content" id="history-content" style="display:none;">
    <h2>変更履歴</h2>
    <ul>
      <li>2026/3/19 初版作成</li>
    </ul>
  </div>

</section>
  
</div>
  
<a href="index" class="back">MY-homeに戻る</a>

<script>function showTab(tab) {
  document.getElementById("terms-content").style.display = "none";
  document.getElementById("privacy-content").style.display = "none";
  document.getElementById("history-content").style.display = "none";

  document.getElementById(tab + "-content").style.display = "block";
}
</script>
  
</body>
</html>
