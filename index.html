<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#fde5b5;
color:black;
text-align:center;
}

h1{
margin-top:25px;
font-weight:600;
letter-spacing:2px;
}

#clock{
font-size:60px;
font-weight:300;
margin-top:10px;
}

#date{
opacity:0.7;
margin-bottom:30px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

input,select{
padding:6px;
border-radius:6px;
border:none;
margin:4px;
}

.category{
margin:30px auto;
max-width:600px;
}

.category h2{
cursor:pointer;
font-weight:400;
opacity:0.9;
}

.links{
margin-top:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.link-item{
background:#1c1c2e;
padding:10px 14px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
}

.link-item a{
color:white;
text-decoration:none;
}

.delete-btn{
background:#ef4444;
}

#editorPanel{
margin-top:20px;
}

#news-box{
  background: rgba(255,255,255,0.85);
  padding:12px;
  border-radius:12px;
  margin:10px;
  text-align:center;
}

#news-list{
  list-style:none;
  padding:0;
}

#news-list li{
  margin:5px 0;
  font-size:14px;
}
#news-box a{
  color:#333;
  text-decoration:none;
  font-weight:500;
}
.news-item{
  background:white;
  padding:10px;
  border-radius:10px;
  font-size:14px;
  text-align:center;
  color:#333;
  box-shadow:0 2px 5px rgba(0,0,0,0.15);
  transition:0.2s;
}
  .news-item:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>My Home</h1>

<div id="clock"></div>
<div id="date"></div>
<div id="weather" style="margin-top:10px; opacity:0.85;"></div>
</div>
  <div id="news-box">
  <h2>News</h2>
  <ul id="news-list"></ul>
    </div>

<div>
<button onclick="addCategory()">カテゴリー追加</button>
<button onclick="toggleEditor()">リンク追加</button>
<button onclick="showBackups()">バックアップ</button>
<button onclick="toggleWallpaper()">壁紙</button>
</div>

<div id="editorPanel" style="display:none">

<input id="linkName" placeholder="名前">
<input id="linkURL" placeholder="URL">

<select id="categorySelect"></select>

<button onclick="addLink()">追加</button>

</div>

<div id="categories"></div>
  <div id="wallpaperPanel" style="display:none;margin-top:20px">

<h3>単色背景</h3>

<input type="color" id="colorPicker">
<br><br>

<h3>写真をアップロード</h3>

<input type="file" id="imageUpload" accept="image/*">

</div>

<script src="script.js"></script>
</body>
</html>
