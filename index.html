<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MY-home</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header>
  <h1>MY-home</h1>

  <div id="info">
    <div id="clock"></div>
    <div id="date"></div>
    <div id="weather"></div>
  </div>
</header>


<section id="news-box">
  <h2>News</h2>
  <div id="news-list"></div>
</section>


<section id="controls">
  <button id="addCategoryBtn">カテゴリー追加</button>
  <button id="addLinkBtn">リンク追加</button>
  <button id="backupBtn">バックアップ</button>
  <button id="wallpaperBtn">壁紙</button>
</section>


<section id="editorPanel" class="hidden">
  <h3>リンク追加</h3>

  <input id="linkName" placeholder="サイト名">
  <input id="linkURL" placeholder="URL">
  <select id="categorySelect"></select>

  <button id="addLinkConfirm">追加</button>
</section>


<main id="categories"></main>


<section id="wallpaperPanel" class="hidden">
  <h3>単色背景</h3>
  <input type="color" id="colorPicker">

  <br><br>

  <h3>画像背景</h3>
  <input type="file" id="imageUpload" accept="image/*">
</section>


<footer>
  <a href="terms">利用規約・プライバシー</a>
</footer>

<script src="script.js"></script>

</body>
</html>
