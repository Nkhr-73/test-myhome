<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My home</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f5f7;
  text-align:center;
  margin:0;
}

/* タイトル */
h1{
  margin-top:40px;
  font-size:40px;
  font-weight:600;
}

/* 時計 */
.clock{
  font-size:70px;
  font-weight:200;
  margin-top:10px;
}

.date{
  font-size:18px;
  color:#666;
  margin-bottom:40px;
}

/* ボタン */
button{
  padding:8px 16px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

/* カテゴリー */
.category{
  margin-top:30px;
}

.category h2{
  font-size:24px;
  margin-bottom:10px;
}

/* リンク */
.links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
}

.link-item{
  background:white;
  padding:10px 15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.link-item a{
  text-decoration:none;
  color:#007aff;
  font-weight:500;
}

.delete-btn{
  margin-left:10px;
  background:#ff3b30;
}

</style>
</head>


<body>

<h1>My home</h1>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<button onclick="addCategory()">カテゴリー追加</button>
<button onclick="addLink()">リンク追加</button>


<div id="categories"></div>

<script>
const STORAGE_KEY = "myhome_data";
const BACKUP_KEY = "myhome_backups";

const STORAGE_KEY="myhome_links";
let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};

function save(){

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

  let backups = JSON.parse(localStorage.getItem(BACKUP_KEY)) || [];

  backups.unshift({
    time: new Date().toLocaleString(),
    data: JSON.parse(JSON.stringify(data))
  });

  if(backups.length > 5){
    backups.pop();
  }

  localStorage.setItem(BACKUP_KEY, JSON.stringify(backups));

}

function render(){

  const container=document.getElementById("categories");
  container.innerHTML="";

  for(let category in data){

    const cat=document.createElement("div");
    cat.className="category";

    const title=document.createElement("h2");
    title.textContent=category;

    const linksDiv=document.createElement("div");
    linksDiv.className="links";

    data[category].forEach((link,index)=>{

      const item=document.createElement("div");
      item.className="link-item";

      const a=document.createElement("a");
      a.href=link.url;
      a.textContent=link.name;
      a.target="_blank";

      const del=document.createElement("button");
      del.textContent="削除";
      del.className="delete-btn";

      del.onclick=()=>{
        data[category].splice(index,1);
        save();
        render();
      }

      item.appendChild(a);
      item.appendChild(del);

      linksDiv.appendChild(item);

    });

    cat.appendChild(title);
    cat.appendChild(linksDiv);

    container.appendChild(cat);

  }

}

function addCategory(){

  const name=prompt("カテゴリー名");

  if(!name)return;

  if(!data[name]){
    data[name]=[];
  }

  save();
  render();
}

function addLink(){

  const category=prompt("カテゴリー名");
  if(!data[category]){
    alert("そのカテゴリーは存在しません");
    return;
  }

  const name=prompt("リンク名");
  const url=prompt("URL");

  if(!name||!url)return;

  data[category].push({name,url});

  save();
  render();

}
  function backupData(){

  const json = JSON.stringify(data);

  const blob = new Blob([json], {type:"application/json"});

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = "myhome-backup.json";

  a.click();

}

function restoreData(){

  const input = document.getElementById("fileInput");

  input.click();

  input.onchange = function(){

    const file = input.files[0];

    const reader = new FileReader();

    reader.onload = function(){

      data = JSON.parse(reader.result);

      save();
      render();

    };

    reader.readAsText(file);

  };

}

/* Apple風時計 */

function updateClock(){

  const now=new Date();

  const h=String(now.getHours()).padStart(2,"0");
  const m=String(now.getMinutes()).padStart(2,"0");
  const s=String(now.getSeconds()).padStart(2,"0");

  document.getElementById("clock").textContent=`${h}:${m}:${s}`;

  const options={
    year:"numeric",
    month:"long",
    day:"numeric",
    weekday:"long"
  };

  document.getElementById("date").textContent=
    now.toLocaleDateString("ja-JP",options);

}

setInterval(updateClock,1000);
updateClock();

render();

</script>

</body>
</html>
