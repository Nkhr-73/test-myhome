<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#fde5b5;
color:white;
text-align:center;
}

h1{
margin-top:25px;
font-weight:600;
letter-spacing:2px;
}

#clock{
font-size:60px;
font-weight:300;
margin-top:10px;
}

#date{
opacity:0.7;
margin-bottom:30px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

input,select{
padding:6px;
border-radius:6px;
border:none;
margin:4px;
}

.category{
margin:30px auto;
max-width:600px;
}

.category h2{
cursor:pointer;
font-weight:400;
opacity:0.9;
}

.links{
margin-top:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.link-item{
background:#1c1c2e;
padding:10px 14px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
}

.link-item a{
color:white;
text-decoration:none;
}

.delete-btn{
background:#ef4444;
}

#editorPanel{
margin-top:20px;
}

#news-box{
  background: rgba(255,255,255,0.8);
  padding:10px;
  border-radius:10px;
  width:300px;
}

#news-list{
  list-style:none;
  padding:0;
}

#news-list li{
  margin:5px 0;
  font-size:14px;
}

</style>
</head>

<body>

<h1>My Home</h1>

<div id="clock"></div>
<div id="date"></div>
<div id="weather" style="margin-top:10px; opacity:0.85;"></div>

<div>
<button onclick="addCategory()">カテゴリー追加</button>
<button onclick="toggleEditor()">リンク追加</button>
<button onclick="showBackups()">バックアップ</button>
<button onclick="toggleWallpaper()">壁紙</button>
</div>

<div id="editorPanel" style="display:none">

<input id="linkName" placeholder="名前">
<input id="linkURL" placeholder="URL">

<select id="categorySelect"></select>

<button onclick="addLink()">追加</button>

</div>

<div id="categories"></div>
  <div id="wallpaperPanel" style="display:none;margin-top:20px">

<h3>単色背景</h3>

<input type="color" id="colorPicker">
<br><br>

<h3>写真をアップロード</h3>

<input type="file" id="imageUpload" accept="image/*">

</div>
  <div id="news-box">
  <h2>ニュース</h2>
  <ul id="news-list"></ul>
</div>

<script>

const STORAGE_KEY="myhome_data";
const BACKUP_KEY="myhome_backups";

let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};

const categoriesDiv=document.getElementById("categories");
const categorySelect=document.getElementById("categorySelect");

function save(){

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

let backups=JSON.parse(localStorage.getItem(BACKUP_KEY))||[];

backups.unshift({
time:new Date().toLocaleString(),
data:JSON.parse(JSON.stringify(data))
});

if(backups.length>5)backups.pop();

localStorage.setItem(BACKUP_KEY,JSON.stringify(backups));

}

function render(){

categoriesDiv.innerHTML="";
categorySelect.innerHTML="";

for(let category in data){

const catDiv=document.createElement("div");
catDiv.className="category";

const title=document.createElement("h2");
title.textContent=category;

const linksDiv=document.createElement("div");
linksDiv.className="links";

title.onclick=()=>{
linksDiv.style.display=
linksDiv.style.display==="none"?"flex":"none";
};

data[category].forEach((link,index)=>{

const item=document.createElement("div");
item.className="link-item";

const a=document.createElement("a");
a.href=link.url;
a.textContent=link.name;
a.target="_blank";

const del=document.createElement("button");
del.textContent="削除";
del.className="delete-btn";

del.onclick=()=>{
data[category].splice(index,1);
save();
render();
};

item.appendChild(a);
item.appendChild(del);
linksDiv.appendChild(item);

});

catDiv.appendChild(title);
catDiv.appendChild(linksDiv);
categoriesDiv.appendChild(catDiv);

const option=document.createElement("option");
option.value=category;
option.textContent=category;

categorySelect.appendChild(option);

}

}

function addCategory(){

const name=prompt("カテゴリー名");

if(!name)return;

if(!data[name]){

data[name]=[];

save();
render();

}

}

function addLink(){

const name=document.getElementById("linkName").value;
const url=document.getElementById("linkURL").value;
const cat=categorySelect.value;

if(!name||!url||!cat)return;

data[cat].push({name,url});

save();
render();

document.getElementById("linkName").value="";
document.getElementById("linkURL").value="";

}

function toggleEditor(){

const panel=document.getElementById("editorPanel");

panel.style.display=
panel.style.display==="none"?"block":"none";

}

function showBackups(){

const backups=JSON.parse(localStorage.getItem(BACKUP_KEY))||[];

if(backups.length===0){
alert("バックアップなし");
return;
}

let text="復元する番号を入力\n\n";

backups.forEach((b,i)=>{
text+=`${i+1} : ${b.time}\n`;
});

const num=prompt(text);

if(!num)return;

const backup=backups[num-1];

if(!backup)return;

data=backup.data;

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  const savedColor=localStorage.getItem("wallpaperColor");
const savedImage=localStorage.getItem("wallpaperImage");

if(savedImage){

document.body.style.background=`url(${savedImage}) center/cover no-repeat fixed`;

}else if(savedColor){

document.body.style.background=savedColor;

}

render();

}

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,"0");
const m=String(now.getMinutes()).padStart(2,"0");
const s=String(now.getSeconds()).padStart(2,"0");

document.getElementById("clock").textContent=`${h}:${m}:${s}`;

const options={year:"numeric",month:"long",day:"numeric",weekday:"long"};

document.getElementById("date").textContent=
now.toLocaleDateString("ja-JP",options);

}

setInterval(updateClock,1000);
updateClock();

render();
async function updateWeather(){

const lat=33.59;
const lon=130.40;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

const res=await fetch(url);
const data=await res.json();

const temp=data.current_weather.temperature;
const code=data.current_weather.weathercode;

const weatherMap={
0:"快晴 ☀️",
1:"晴れ 🌤",
2:"やや曇り ⛅",
3:"曇り ☁️",
45:"霧 🌫",
48:"霧 🌫",
51:"小雨 🌦",
61:"雨 🌧",
63:"強い雨 🌧",
71:"雪 ❄️"
};

const weather=weatherMap[code]||"天気";

document.getElementById("weather").textContent=
`福岡 ${weather} ${temp}°C`;

}

updateWeather();
setInterval(updateWeather,600000);

function toggleWallpaper(){

const panel=document.getElementById("wallpaperPanel");

panel.style.display=
panel.style.display==="none"?"block":"none";

}

const colorPicker=document.getElementById("colorPicker");

colorPicker.oninput=function(){

document.body.style.background=colorPicker.value;

localStorage.setItem("wallpaperColor",colorPicker.value);

};

const imageUpload=document.getElementById("imageUpload");

imageUpload.onchange=function(e){

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(event){

const img=event.target.result;

document.body.style.background=`url(${img}) center/cover no-repeat fixed`;

localStorage.setItem("wallpaperImage",img);

};

reader.readAsDataURL(file);

};
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www3.nhk.or.jp/rss/news/cat0.xml")
.then(res => res.json())
.then(data => {

  const list = document.getElementById("news-list")

  data.items.slice(0,5).forEach(news => {

    const li = document.createElement("li")

    li.innerHTML = `<a href="${news.link}" target="_blank">${news.title}</a>`

    list.appendChild(li)

  })

})
  

</script>

</body>
</html>
